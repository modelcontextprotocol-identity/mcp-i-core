<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="12" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="800" height="36" rx="12" fill="#313244"/>
  <rect y="24" width="800" height="12" fill="#313244"/>
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <text x="400" y="22" text-anchor="middle" fill="#cdd6f4" font-size="12">_meta.proof — Tool Response</text>

  <!-- Code block -->
  <text fill="#cdd6f4" font-size="13">
    <tspan x="30" y="72" fill="#585b70">// Every tool response includes this</tspan>
    <tspan x="30" y="96" fill="#cba6f7">"_meta"</tspan><tspan fill="#cdd6f4">: {</tspan>
    <tspan x="50" y="120" fill="#cba6f7">"proof"</tspan><tspan fill="#cdd6f4">: {</tspan>

    <tspan x="70" y="156" fill="#89b4fa">"jws"</tspan><tspan fill="#cdd6f4">: </tspan><tspan fill="#a6e3a1">"eyJhbGciOiJFZERTQSIs..."</tspan><tspan fill="#cdd6f4">,</tspan>

    <tspan x="70" y="204" fill="#89b4fa">"meta"</tspan><tspan fill="#cdd6f4">: {</tspan>
    <tspan x="90" y="234" fill="#f9e2af">"did"</tspan><tspan fill="#cdd6f4">: </tspan><tspan fill="#a6e3a1">"did:key:z6Mk..."</tspan><tspan fill="#cdd6f4">,</tspan>
    <tspan x="90" y="264" fill="#f9e2af">"kid"</tspan><tspan fill="#cdd6f4">: </tspan><tspan fill="#a6e3a1">"did:key:z6Mk...#keys-1"</tspan><tspan fill="#cdd6f4">,</tspan>
    <tspan x="90" y="294" fill="#f9e2af">"ts"</tspan><tspan fill="#cdd6f4">:  </tspan><tspan fill="#fab387">1710288000</tspan><tspan fill="#cdd6f4">,</tspan>
    <tspan x="90" y="324" fill="#f9e2af">"requestHash"</tspan><tspan fill="#cdd6f4">: </tspan><tspan fill="#a6e3a1">"sha256:5057..."</tspan><tspan fill="#cdd6f4">,</tspan>
    <tspan x="90" y="354" fill="#f9e2af">"responseHash"</tspan><tspan fill="#cdd6f4">: </tspan><tspan fill="#a6e3a1">"sha256:a1b2..."</tspan>

    <tspan x="70" y="384" fill="#cdd6f4">}</tspan>
    <tspan x="50" y="408" fill="#cdd6f4">}</tspan>
    <tspan x="30" y="432" fill="#cdd6f4">}</tspan>
  </text>

  <!-- Annotation lines and labels -->

  <!-- JWS annotation -->
  <line x1="500" y1="156" x2="570" y2="156" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <rect x="575" y="140" width="210" height="38" rx="6" fill="#313244" filter="url(#shadow)"/>
  <text x="585" y="155" fill="#f38ba8" font-size="11" font-weight="bold">Ed25519 signature</text>
  <text x="585" y="170" fill="#94a3b8" font-size="10">Tamper = signature breaks</text>

  <!-- DID annotation -->
  <line x1="370" y1="234" x2="570" y2="210" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <rect x="575" y="194" width="210" height="38" rx="6" fill="#313244" filter="url(#shadow)"/>
  <text x="585" y="209" fill="#f9e2af" font-size="11" font-weight="bold">Server's identity</text>
  <text x="585" y="224" fill="#94a3b8" font-size="10">Verifiable by anyone, anywhere</text>

  <!-- Timestamp annotation -->
  <line x1="310" y1="294" x2="570" y2="270" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <rect x="575" y="254" width="210" height="38" rx="6" fill="#313244" filter="url(#shadow)"/>
  <text x="585" y="269" fill="#fab387" font-size="11" font-weight="bold">Unix timestamp</text>
  <text x="585" y="284" fill="#94a3b8" font-size="10">Prevents replay attacks</text>

  <!-- Request hash annotation -->
  <line x1="410" y1="324" x2="570" y2="324" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <rect x="575" y="308" width="210" height="38" rx="6" fill="#313244" filter="url(#shadow)"/>
  <text x="585" y="323" fill="#a6e3a1" font-size="11" font-weight="bold">Hash of your request</text>
  <text x="585" y="338" fill="#94a3b8" font-size="10">Binds request → response</text>

  <!-- Response hash annotation -->
  <line x1="410" y1="354" x2="570" y2="374" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <rect x="575" y="362" width="210" height="38" rx="6" fill="#313244" filter="url(#shadow)"/>
  <text x="585" y="377" fill="#a6e3a1" font-size="11" font-weight="bold">Hash of the response</text>
  <text x="585" y="392" fill="#94a3b8" font-size="10">Proves nothing was modified</text>

  <!-- Bottom tagline -->
  <text x="400" y="470" text-anchor="middle" fill="#585b70" font-size="11" font-family="sans-serif">
    Every field is verifiable. No trust required.
  </text>
  <text x="400" y="490" text-anchor="middle" fill="#45475a" font-size="10" font-family="sans-serif">
    mcp-i-core — Identity layer for the Model Context Protocol
  </text>
</svg>
